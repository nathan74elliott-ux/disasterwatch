<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DisasterWatch — Login / Sign Up</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark" id="mainNav">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">🌍 DisasterWatch</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">🗺️ Live Map</a></li>
          <li class="nav-item"><a class="nav-link" href="trends.html">📊 Trends</a></li>
          <li class="nav-item"><a class="nav-link active" href="login.html" id="loginLink">🔐 Login / Sign Up</a></li>
          <li class="nav-item"><a class="nav-link d-none" href="dashboard.html" id="dashboardLink">⭐ My Bookmarks</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5 mb-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card shadow p-4">
          <div class="row g-4">
            <div class="col-md-6 border-end">
              <h2 class="text-center mb-4 fw-bold" style="color: #1A73A7;">🔐 Login</h2>

              <div class="mb-3">
                <label class="form-label fw-bold">Username or Email</label>
                <input type="text" id="loginUserInput" class="form-control" placeholder="e.g. bob or bob@mail.com">
              </div>

              <div class="mb-3">
                <label class="form-label fw-bold">Password</label>
                <input type="password" id="loginPassInput" class="form-control" placeholder="Enter password">
              </div>

              <div id="loginMsg" class="alert d-none"></div>

              <button id="loginBtn" class="btn btn-primary w-100 py-2 fw-bold">Login</button>
              <p class="text-center text-muted mt-3 small">Demo credentials: bob / bobpass</p>
            </div>

            <div class="col-md-6">
              <h2 class="text-center mb-4 fw-bold" style="color: #1A73A7;">📝 Sign Up</h2>

              <div class="mb-3">
                <label class="form-label fw-bold">Username</label>
                <input type="text" id="signupUsername" class="form-control" placeholder="Choose a username">
              </div>

              <div class="mb-3">
                <label class="form-label fw-bold">Email</label>
                <input type="email" id="signupEmail" class="form-control" placeholder="Enter your email">
              </div>

              <div class="mb-3">
                <label class="form-label fw-bold">Password</label>
                <input type="password" id="signupPassword" class="form-control" placeholder="Choose a password">
              </div>

              <div id="signupMsg" class="alert d-none"></div>

              <button id="signupBtn" class="btn btn-outline-primary w-100 py-2 fw-bold">Create Account</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script>
    function showMessage(elementId, type, message) {
      const box = document.getElementById(elementId);
      box.className = 'alert alert-' + type;
      box.textContent = message;
      box.classList.remove('d-none');
    }

    function handleLogin() {
      const user = document.getElementById('loginUserInput').value.trim();
      const pass = document.getElementById('loginPassInput').value.trim();
      const result = login(user, pass);

      if (result.success) {
        window.location.href = 'dashboard.html';
      } else {
        showMessage('loginMsg', 'danger', result.message);
      }
    }

    function handleSignup() {
      const username = document.getElementById('signupUsername').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value.trim();
      const result = signup(username, email, password);

      if (result.success) {
        showMessage('signupMsg', 'success', 'Account created. You are now logged in.');
        window.location.href = 'dashboard.html';
      } else {
        showMessage('signupMsg', 'danger', result.message);
      }
    }

    document.getElementById('loginBtn').addEventListener('click', handleLogin);
    document.getElementById('signupBtn').addEventListener('click', handleSignup);

    document.addEventListener('keydown', function (e) {
      if (e.key !== 'Enter') return;

      const active = document.activeElement;
      if (!active) return;

      if (active.id === 'loginUserInput' || active.id === 'loginPassInput') {
        handleLogin();
      }

      if (
        active.id === 'signupUsername' ||
        active.id === 'signupEmail' ||
        active.id === 'signupPassword'
      ) {
        handleSignup();
      }
    });
  </script>
</body>
</html>
